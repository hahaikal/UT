<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITTA - Informasi Stok Bahan Ajar</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">SITTA</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Beranda</a></li>
            <li><a href="stok.html">Info Stok</a></li>
            <li><a href="tracking.html">Lacak Pengiriman</a></li>
            <li><a href="index.html">Keluar</a></li>
        </ul>
    </nav>

    <div class="main-container">
        
        <div class="card" style="margin-bottom: 30px;">
            <h2 style="color: #0056b3; margin-bottom: 15px;">Tambah Stok Baru</h2>
            <form id="addStockForm" style="display: flex; gap: 15px; flex-wrap: wrap;">
                <div class="input-group" style="flex: 2; margin-bottom: 0;">
                    <input type="text" id="newBookName" placeholder="Nama Bahan Ajar Baru" required>
                </div>
                <div class="input-group" style="flex: 1; margin-bottom: 0;">
                    <input type="number" id="newBookStock" placeholder="Jumlah Stok" min="1" required>
                </div>
                <button type="submit" class="btn" style="flex: 1; height: 100%; padding: 12px;">Tambah Stok</button>
            </form>
        </div>

        <h2 style="color: #333; margin-bottom: 10px;">Daftar Ketersediaan Bahan Ajar</h2>
        
        <div id="stockContainer" class="grid-container">
        </div>

    </div>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
